<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>図版類似検索ツール AI版</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #f4f1ec;
    --surface: #ffffff;
    --border: #d6d0c4;
    --accent: #2d5a8e;
    --accent2: #c8440a;
    --text: #1a1a1a;
    --text-muted: #7a7670;
    --success: #2d7a4f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: var(--accent);
    color: white;
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 4px solid var(--accent2);
  }

  header h1 {
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    letter-spacing: 0.05em;
  }

  header .ai-badge {
    background: var(--accent2);
    color: white;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  header span.sub {
    font-size: 12px;
    opacity: 0.7;
    font-weight: 300;
    margin-left: auto;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .panel-header {
    background: var(--accent);
    color: white;
    padding: 12px 20px;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-header .step {
    background: var(--accent2);
    color: white;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 2px;
  }

  .panel-body { padding: 20px; }

  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 4px;
    padding: 32px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--bg);
  }

  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--accent);
    background: #edf2f8;
  }

  .drop-zone .icon { font-size: 36px; margin-bottom: 12px; }
  .drop-zone p { font-size: 13px; color: var(--text-muted); line-height: 1.7; }
  .drop-zone strong { color: var(--accent); }

  input[type="file"] { display: none; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 20px;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;
  }

  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #1e4070; }
  .btn-primary:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; }

  .btn-danger { background: var(--accent2); color: white; font-size: 12px; padding: 6px 14px; }
  .btn-danger:hover { background: #a33508; }

  .status-bar {
    margin-top: 16px;
    padding: 12px 16px;
    border-radius: 3px;
    font-size: 12px;
    display: none;
  }

  .status-bar.info { background: #edf2f8; border-left: 3px solid var(--accent); display: block; }
  .status-bar.success { background: #e8f5ee; border-left: 3px solid var(--success); display: block; color: var(--success); }
  .status-bar.error { background: #fdf0ed; border-left: 3px solid var(--accent2); display: block; color: var(--accent2); }

  .file-list { margin-top: 16px; max-height: 200px; overflow-y: auto; }

  .file-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }

  .file-item:last-child { border-bottom: none; }
  .file-item .name { flex: 1; color: var(--text); }
  .file-item .count { color: var(--text-muted); font-family: 'Space Mono', monospace; }
  .file-item .ok { color: var(--success); }
  .file-item .loading { color: var(--accent); }

  .progress-wrap { margin-top: 16px; display: none; }
  .progress-wrap.show { display: block; }

  .progress-bar-bg {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s;
  }

  .progress-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 6px;
    font-family: 'Space Mono', monospace;
  }

  .results-panel { grid-column: 1 / -1; }

  .results-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-top: 4px;
  }

  .result-card {
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    transition: box-shadow 0.2s;
  }

  .result-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }

  .result-card .rank {
    background: var(--accent);
    color: white;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 6px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .result-card .rank .score {
    background: rgba(255,255,255,0.2);
    padding: 2px 8px;
    border-radius: 2px;
    font-size: 10px;
  }

  .result-card img { width: 100%; display: block; background: #f9f9f9; }

  .result-card .info { padding: 12px; border-top: 1px solid var(--border); }

  .result-card .info .file-name {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'Space Mono', monospace;
    margin-bottom: 4px;
    word-break: break-all;
  }

  .result-card .info .page-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.5;
  }

  .result-card .info .ai-reason {
    margin-top: 8px;
    font-size: 11px;
    color: var(--text-muted);
    background: var(--bg);
    padding: 6px 8px;
    border-radius: 3px;
    line-height: 1.5;
  }

  .empty-state {
    text-align: center;
    padding: 48px;
    color: var(--text-muted);
    font-size: 13px;
  }

  .empty-state .big { font-size: 48px; margin-bottom: 12px; }

  .index-summary {
    margin-top: 12px;
    padding: 10px 14px;
    background: var(--bg);
    border-radius: 3px;
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .index-summary b { color: var(--accent); font-family: 'Space Mono', monospace; }

  .query-preview {
    margin-top: 16px;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .query-preview img { width: 100%; display: block; max-height: 220px; object-fit: contain; background: #f9f9f9; }

  .query-preview .label {
    padding: 8px 12px;
    font-size: 11px;
    color: var(--text-muted);
    background: var(--bg);
    border-top: 1px solid var(--border);
  }

  .divider {
    grid-column: 1 / -1;
    border: none;
    border-top: 1px solid var(--border);
  }

  .searching-indicator {
    text-align: center;
    padding: 32px;
    color: var(--accent);
    font-size: 13px;
  }

  .spinner {
    display: inline-block;
    width: 24px;
    height: 24px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 700px) {
    .container { grid-template-columns: 1fr; }
    .results-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div>📐</div>
  <h1>図版類似検索ツール</h1>
  <span class="ai-badge">AI版</span>
  <span class="sub">理科図版ストック検索システム</span>
</header>

<div class="container">

  <!-- STEP 1 -->
  <div class="panel">
    <div class="panel-header">
      <span class="step">STEP 1</span>
      ストックPDFを取り込む（初回のみ）
    </div>
    <div class="panel-body">
      <div class="drop-zone" id="stockDropZone" onclick="document.getElementById('stockInput').click()">
        <div class="icon">📁</div>
        <p>ストックのPDFファイルを<br>ここにドラッグ＆ドロップ<br><strong>複数ファイル同時OK</strong></p>
      </div>
      <input type="file" id="stockInput" multiple accept=".pdf">

      <div class="file-list" id="stockFileList"></div>

      <div class="progress-wrap" id="progressWrap">
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
        <div class="progress-label" id="progressLabel">処理中...</div>
      </div>

      <div id="stockStatus" class="status-bar"></div>

      <div style="margin-top:16px; display:flex; gap:8px; flex-wrap:wrap;">
        <button class="btn btn-primary" id="buildIndexBtn" onclick="buildIndex()" disabled>
          📊 インデックスを作成する
        </button>
        <button class="btn btn-danger" onclick="clearIndex()" id="clearBtn" style="display:none">
          🗑 リセット
        </button>
      </div>

      <div class="index-summary" id="indexSummary" style="display:none"></div>
    </div>
  </div>

  <!-- STEP 2 -->
  <div class="panel">
    <div class="panel-header">
      <span class="step">STEP 2</span>
      探したい図版PDFをアップロード
    </div>
    <div class="panel-body">
      <div class="drop-zone" id="queryDropZone" onclick="document.getElementById('queryInput').click()">
        <div class="icon">🔍</div>
        <p>探したい図版が含まれる<br>PDFをドラッグ＆ドロップ<br><strong>1ファイル・1ページ目を使用</strong></p>
      </div>
      <input type="file" id="queryInput" accept=".pdf">

      <div class="query-preview" id="queryPreview" style="display:none">
        <img id="queryImg" src="" alt="検索図版">
        <div class="label" id="queryLabel"></div>
      </div>

      <div id="queryStatus" class="status-bar"></div>

      <div style="margin-top:16px;">
        <button class="btn btn-primary" id="searchBtn" onclick="searchSimilar()" disabled>
          🤖 AIで類似図版を検索する
        </button>
      </div>
    </div>
  </div>

  <hr class="divider">

  <!-- 結果 -->
  <div class="panel results-panel">
    <div class="panel-header">検索結果</div>
    <div class="panel-body">
      <div id="resultsArea">
        <div class="empty-state">
          <div class="big">📋</div>
          <p>STEP 1でストックを取り込み、<br>STEP 2で探したい図版をアップロードすると<br>AIが類似図版を探します</p>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  let stockIndex = []; // [{fileName, pageNum, pageName, imageData}]
  let queryImageData = null;
  let queryPageName = '';
  let pendingFiles = [];

  setupDropZone('stockDropZone', 'stockInput', handleStockFiles);
  setupDropZone('queryDropZone', 'queryInput', handleQueryFile);

  function setupDropZone(zoneId, inputId, handler) {
    const zone = document.getElementById(zoneId);
    const input = document.getElementById(inputId);
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('dragover');
      handler(Array.from(e.dataTransfer.files));
    });
    input.addEventListener('change', () => handler(Array.from(input.files)));
  }

  function handleStockFiles(files) {
    const pdfs = files.filter(f => f.name.toLowerCase().endsWith('.pdf'));
    if (pdfs.length === 0) { showStatus('stockStatus', 'PDFファイルを選択してください', 'error'); return; }
    pendingFiles = pdfs;

    const list = document.getElementById('stockFileList');
    list.innerHTML = pdfs.map(f => `
      <div class="file-item">
        <span>📄</span>
        <span class="name">${f.name}</span>
        <span class="count loading" id="fc_${sanitizeId(f.name)}">待機中</span>
      </div>
    `).join('');

    document.getElementById('buildIndexBtn').disabled = false;
    showStatus('stockStatus', `${pdfs.length}ファイルが選択されました。「インデックスを作成する」を押してください。`, 'info');
  }

  function sanitizeId(name) {
    return name.replace(/[^a-zA-Z0-9]/g, '_');
  }

  async function buildIndex() {
    if (pendingFiles.length === 0) return;
    stockIndex = [];
    document.getElementById('buildIndexBtn').disabled = true;
    const progressWrap = document.getElementById('progressWrap');
    progressWrap.classList.add('show');

    let total = pendingFiles.length;
    let done = 0;

    for (const file of pendingFiles) {
      const sid = sanitizeId(file.name);
      const fcEl = document.getElementById('fc_' + sid);
      if (fcEl) { fcEl.textContent = '処理中...'; fcEl.className = 'count loading'; }

      try {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        const numPages = pdf.numPages;

        for (let pageNum = 1; pageNum <= numPages; pageNum++) {
          const page = await pdf.getPage(pageNum);
          const scale = 1.2;
          const viewport = page.getViewport({ scale });
          const canvas = document.createElement('canvas');
          canvas.width = viewport.width;
          canvas.height = viewport.height;
          const ctx = canvas.getContext('2d');
          await page.render({ canvasContext: ctx, viewport }).promise;

          const textContent = await page.getTextContent();
          const pageText = textContent.items.map(i => i.str).join(' ').trim();
          const imageData = canvas.toDataURL('image/jpeg', 0.6);

          stockIndex.push({ fileName: file.name, pageNum, pageName: pageText.substring(0, 150), imageData });
        }

        done++;
        const pct = Math.round((done / total) * 100);
        document.getElementById('progressFill').style.width = pct + '%';
        document.getElementById('progressLabel').textContent = `${done}/${total} ファイル処理済 (${pct}%)`;
        if (fcEl) { fcEl.textContent = `${numPages}ページ`; fcEl.className = 'count ok'; }

      } catch (e) {
        console.error(e);
        if (fcEl) { fcEl.textContent = 'エラー'; fcEl.className = 'count'; }
      }
    }

    showStatus('stockStatus', `✅ インデックス完成：${stockIndex.length}ページ取り込み済`, 'success');
    document.getElementById('clearBtn').style.display = 'inline-flex';
    document.getElementById('indexSummary').style.display = 'flex';
    document.getElementById('indexSummary').innerHTML = `
      <span>ファイル数: <b>${pendingFiles.length}</b></span>
      <span>総ページ数: <b>${stockIndex.length}</b></span>
    `;
    updateSearchBtn();
  }

  async function handleQueryFile(files) {
    const file = files.find(f => f.name.toLowerCase().endsWith('.pdf'));
    if (!file) { showStatus('queryStatus', 'PDFファイルを選択してください', 'error'); return; }

    showStatus('queryStatus', '図版を読み込み中...', 'info');

    try {
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      const page = await pdf.getPage(1);
      const scale = 1.5;
      const viewport = page.getViewport({ scale });
      const canvas = document.createElement('canvas');
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      const ctx = canvas.getContext('2d');
      await page.render({ canvasContext: ctx, viewport }).promise;

      const textContent = await page.getTextContent();
      queryPageName = textContent.items.map(i => i.str).join(' ').trim();
      queryImageData = canvas.toDataURL('image/jpeg', 0.75);

      document.getElementById('queryPreview').style.display = 'block';
      document.getElementById('queryImg').src = queryImageData;
      document.getElementById('queryLabel').textContent = file.name + (queryPageName ? ' — ' + queryPageName.substring(0, 60) : '');

      showStatus('queryStatus', '✅ 図版を読み込みました', 'success');
      updateSearchBtn();
    } catch(e) {
      showStatus('queryStatus', 'PDFの読み込みに失敗しました', 'error');
      console.error(e);
    }
  }

  function updateSearchBtn() {
    document.getElementById('searchBtn').disabled = !(queryImageData && stockIndex.length > 0);
  }

  async function searchSimilar() {
    if (!queryImageData || stockIndex.length === 0) return;

    document.getElementById('resultsArea').innerHTML = `
      <div class="searching-indicator">
        <div class="spinner"></div>
        <p>AIが図版を分析・比較中です...<br><small>しばらくお待ちください</small></p>
      </div>`;

    document.getElementById('searchBtn').disabled = true;

    try {
      // ストック画像一覧をAIに渡してまず「何の図版か」を説明させる（最大20件ずつ処理）
      // まず検索対象を絞る：全ページをAIに説明してもらいインデックス化
      // 効率化：まず検索クエリ図版をAIに説明させる
      const queryDescription = await describeImage(queryImageData, queryPageName);

      // 次にストック各ページとの類似度をAIに判定させる
      // 効率化のためバッチで処理（一度に複数画像を比較）
      const results = await findSimilarWithAI(queryDescription, queryImageData);

      if (results.length === 0) {
        document.getElementById('resultsArea').innerHTML = `
          <div class="empty-state">
            <div class="big">🤔</div>
            <p>類似する図版が見つかりませんでした。<br>別の図版で試してみてください。</p>
          </div>`;
      } else {
        const html = `<div class="results-grid">
          ${results.slice(0, 3).map((item, idx) => `
            <div class="result-card">
              <div class="rank">
                <span>${['🥇 1位', '🥈 2位', '🥉 3位'][idx]}</span>
                <span class="score">類似度 ${item.score}%</span>
              </div>
              <img src="${item.imageData}" alt="図版">
              <div class="info">
                <div class="file-name">📄 ${item.fileName}　p.${item.pageNum}</div>
                <div class="page-name">${item.pageName || '（テキストなし）'}</div>
                <div class="ai-reason">🤖 ${item.reason}</div>
              </div>
            </div>
          `).join('')}
        </div>`;
        document.getElementById('resultsArea').innerHTML = html;
      }
    } catch(e) {
      console.error(e);
      document.getElementById('resultsArea').innerHTML = `
        <div class="empty-state">
          <div class="big">⚠️</div>
          <p>エラーが発生しました。<br>${e.message}</p>
        </div>`;
    }

    document.getElementById('searchBtn').disabled = false;
  }

  async function describeImage(imageData, pageText) {
    const base64 = imageData.split(',')[1];
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'image',
              source: { type: 'base64', media_type: 'image/jpeg', data: base64 }
            },
            {
              type: 'text',
              text: `この理科の教材図版を詳しく説明してください。以下の点を含めてください：
1. 何を描いた図版か（テーマ・内容）
2. 図版の種類（断面図、概念図、構造図、グラフ等）
3. 図版に含まれる主要な要素・構造
4. 図版のレイアウト・構成の特徴

テキスト情報：${pageText || 'なし'}

簡潔に200字以内で説明してください。`
            }
          ]
        }]
      })
    });

    const data = await response.json();
    return data.content[0].text;
  }

  async function findSimilarWithAI(queryDescription, queryImageData) {
    // バッチサイズを設定（一度に比較する数）
    const BATCH_SIZE = 5;
    let allScored = [];

    const queryBase64 = queryImageData.split(',')[1];

    for (let i = 0; i < stockIndex.length; i += BATCH_SIZE) {
      const batch = stockIndex.slice(i, i + BATCH_SIZE);

      // バッチ内の各ページと比較
      const batchContent = [
        {
          type: 'image',
          source: { type: 'base64', media_type: 'image/jpeg', data: queryBase64 }
        },
        {
          type: 'text',
          text: `上の画像が「検索したい図版」です。\n図版の説明：${queryDescription}\n\n以下の${batch.length}枚の図版それぞれについて、検索図版との類似度を0〜100で評価してください。\n類似度の基準：内容・テーマ・図版タイプ・構造の類似性を総合的に判断してください。\n\nJSON形式のみで回答してください：\n{"results": [{"index": 0, "score": 85, "reason": "理由（20字以内）"}, ...]}`
        }
      ];

      // バッチの各画像を追加
      batch.forEach((item, idx) => {
        const b64 = item.imageData.split(',')[1];
        batchContent.push({
          type: 'text',
          text: `\n図版${idx}（${item.fileName} p.${item.pageNum}）：`
        });
        batchContent.push({
          type: 'image',
          source: { type: 'base64', media_type: 'image/jpeg', data: b64 }
        });
      });

      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            messages: [{ role: 'user', content: batchContent }]
          })
        });

        const data = await response.json();
        const text = data.content[0].text;
        const clean = text.replace(/```json|```/g, '').trim();
        const parsed = JSON.parse(clean);

        parsed.results.forEach(r => {
          allScored.push({
            ...batch[r.index],
            score: r.score,
            reason: r.reason
          });
        });

        // 進捗更新
        const progress = Math.min(100, Math.round(((i + BATCH_SIZE) / stockIndex.length) * 100));
        document.querySelector('.searching-indicator p').innerHTML =
          `AIが図版を分析・比較中です... ${progress}%<br><small>しばらくお待ちください</small>`;

        // 上位3件が確定したら早期終了（最低でも全体の半分は処理）
        if (i >= stockIndex.length / 2) {
          allScored.sort((a, b) => b.score - a.score);
          if (allScored[0]?.score >= 90) break;
        }

      } catch(e) {
        console.error('バッチ処理エラー:', e);
      }
    }

    allScored.sort((a, b) => b.score - a.score);
    return allScored;
  }

  function clearIndex() {
    stockIndex = [];
    pendingFiles = [];
    queryImageData = null;
    queryPageName = '';
    document.getElementById('stockFileList').innerHTML = '';
    document.getElementById('progressWrap').classList.remove('show');
    document.getElementById('stockStatus').className = 'status-bar';
    document.getElementById('indexSummary').style.display = 'none';
    document.getElementById('clearBtn').style.display = 'none';
    document.getElementById('buildIndexBtn').disabled = true;
    document.getElementById('searchBtn').disabled = true;
    document.getElementById('queryPreview').style.display = 'none';
    document.getElementById('queryStatus').className = 'status-bar';
    document.getElementById('resultsArea').innerHTML = `
      <div class="empty-state">
        <div class="big">📋</div>
        <p>リセットしました。STEP 1から始めてください。</p>
      </div>`;
  }

  function showStatus(id, msg, type) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className = 'status-bar ' + type;
  }
</script>
